<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#111;
    color:white;
}

.hidden{
    display:none;
}

/* CONNEXION */

.login-screen{
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#000;
    z-index:9999;
}

.login-box{
    background:#1b1b1b;
    padding:30px;
    border-radius:15px;
    width:320px;
    text-align:center;
    box-shadow:0 0 20px rgba(255,215,0,0.2);
}

.login-box h1{
    color:gold;
    margin-bottom:10px;
}

.login-box input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    margin:15px 0;
}

.login-box button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:gold;
    color:black;
    font-weight:bold;
    cursor:pointer;
}

#errorMessage{
    color:#ff4d4d;
    margin-top:10px;
}

/* HEADER */

header{
    text-align:center;
    padding:40px 20px;
}

header h1{
    color:gold;
    margin-bottom:10px;
}

/* CARTES */

.friend-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
    padding:25px;
    max-width:1400px;
    margin:auto;
}

.friend-card{
    background:#1b1b1b;
    border-radius:15px;
    overflow:hidden;
    transition:.3s;
}

.friend-card:hover{
    transform:translateY(-8px);
    box-shadow:0 0 20px rgba(255,215,0,0.4);
}

.friend-card img{
    width:100%;
    height:300px;
    object-fit:cover;
}

.friend-info{
    padding:15px;
    text-align:center;
}

.friend-info h3{
    margin-bottom:15px;
}

.friend-info button{
    padding:10px 20px;
    border:none;
    border-radius:8px;
    background:gold;
    color:black;
    font-weight:bold;
    cursor:pointer;
}

/* MODAL (CORRIGÉ) */

.modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.9);
    z-index:10000;
    overflow-y:auto;
}

.modal-content{
    background:#1b1b1b;
    width:95%;
    max-width:800px;
    max-height:95vh;
    overflow-y:auto;
    margin:20px auto;
    padding:20px;
    border-radius:15px;
    position:relative;
}

.modal-content img{
    width:100%;
    max-height:400px;
    object-fit:contain;
    border-radius:10px;
    margin:15px 0;
}

.modal-content p{
    margin:8px 0;
    word-wrap:break-word;
}

.close{
    position:absolute;
    top:10px;
    right:15px;
    font-size:30px;
    cursor:pointer;
    color:white;
}

/* SCROLL BAR (optionnel mais propre) */

.modal::-webkit-scrollbar,
.modal-content::-webkit-scrollbar{
    width:8px;
}

.modal::-webkit-scrollbar-thumb,
.modal-content::-webkit-scrollbar-thumb{
    background:gold;
    border-radius:10px;
}
</style>

const modal = document.getElementById("modal");
